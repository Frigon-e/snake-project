version: '3.9'
services:
  app:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "4321:4321"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npx astro dev --host 0.0.0.0"
    env_file:
      - .env.local
