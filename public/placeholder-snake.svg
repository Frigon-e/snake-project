<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f0f"/>
      <stop offset="100%" style="stop-color:#1e2020"/>
    </linearGradient>
    <linearGradient id="scale" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9ed1bd;stop-opacity:0.12"/>
      <stop offset="50%" style="stop-color:#9ed1bd;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#9ed1bd;stop-opacity:0.12"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Subtle scale pattern -->
  <ellipse cx="200" cy="150" rx="140" ry="80" fill="url(#scale)"/>
  <ellipse cx="200" cy="150" rx="100" ry="55" fill="none" stroke="#9ed1bd" stroke-width="0.5" stroke-opacity="0.15"/>
  <ellipse cx="200" cy="150" rx="60" ry="32" fill="none" stroke="#9ed1bd" stroke-width="0.5" stroke-opacity="0.1"/>
  <!-- Specimen label -->
  <text x="200" y="220" text-anchor="middle" font-family="'Noto Serif', Georgia, serif" font-size="11" fill="#9ed1bd" fill-opacity="0.5" letter-spacing="4">SPECIMEN</text>
</svg>
